    <!-- The fix is right here in the section tag -->
    <section style="margin-top: 150px; display: flex; justify-content: center;">
        <img class="mySlides" src="RMS1.jpg" style="height:400px;">
        <img class="mySlides" src="RMS2.jpg" style="height:400px;">
        <img class="mySlides" src="RMS3.png" style="height:400px;">
        <img class="mySlides" src="RMS4.jpeg" style="height:400px;">
    </section>

    <script>
        var myIndex = 0;
        carousel();

        function carousel() {
            var i;
            var x = document.getElementsByClassName("mySlides");
            for (i = 0; i < x.length; i++) {
                x[i].style.display = "none";  
            }
            myIndex++;
            if (myIndex > x.length) {myIndex = 1}    
            x[myIndex-1].style.display = "block";  
            setTimeout(carousel, 3000); 
        }
    </script>
